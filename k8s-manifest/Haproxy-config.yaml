apiVersion: v1
kind: ConfigMap
metadata:
  name: haproxy-config
data:
  haproxy.cfg: |
    defaults
        mode http
        timeout connect 5s
        timeout client 50s
        timeout server 50s

  
    resolvers kube-dns
        nameserver dns1 kube-dns.kube-system.svc.cluster.local:53
        resolve_retries 3
        timeout resolve 1s
        hold valid 10s

    frontend http_front
        bind *:8080
        default_backend tomcat_back

    backend tomcat_back
        balance roundrobin
        server s1 tomcat-service:8080 check resolvers kube-dns resolve-prefer ipv4
